name: CI

on:
  schedule:
    - cron: '0 3 * * *'
  pull_request:
  push:
    branches:
      - main
jobs:
  docker:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Get latest Mautic release
        id: mautic_release
        uses: actions/github-script@v8
        with:
          script: |
            const release = await github.rest.repos.getLatestRelease({
              owner: 'mautic',
              repo: 'mautic'
            });
            if (!release?.data?.tag_name) {
              core.setFailed('Failed to fetch latest Mautic release');
            }
            core.setOutput('version', release.data.tag_name.replace(/^v/, ''));

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if image already exists (for scheduler)
        id: image_check
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            REPO="${{ github.repository }}"
            REPO="${REPO,,}" # Convert to lowercase
            IMAGE="ghcr.io/$REPO:${{ steps.mautic_release.outputs.version }}"

            echo "::notice::Checking if image exists: $IMAGE"

            if docker manifest inspect "$IMAGE"; then
              echo "::notice::Image already exists, skipping scheduled build."
              echo "skip_build=true" >> "$GITHUB_OUTPUT"
            else
              echo "::notice::Image not found or registry error – proceeding with build."
            fi
          else
            echo "::notice::Triggered by ${{ github.event_name }} – forcing rebuild."
          fi
      - name: Announce build
        if: steps.image_check.outputs.skip_build != 'true'
        run: |
          echo "::notice::Building image for Mautic ${{ steps.mautic_release.outputs.version }}"

      - name: Checkout
        if: steps.image_check.outputs.skip_build != 'true'
        uses: actions/checkout@v6

      - name: Extract metadata
        if: steps.image_check.outputs.skip_build != 'true'
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          # Docker metadata-action normalizes image name to lowercase
          tags: |
            type=sha
            type=raw,value=latest
            type=raw,value=${{ steps.mautic_release.outputs.version }}

      - name: Set up Docker Buildx
        if: steps.image_check.outputs.skip_build != 'true'
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        if: steps.image_check.outputs.skip_build != 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.production
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            MAUTIC_VERSION=${{ steps.mautic_release.outputs.version }}
            buildno=${{ github.run_number }}
            gitcommithash=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
