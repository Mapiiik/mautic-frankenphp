name: CI

on:
  schedule:
    - cron: '0 3 * * *'
  pull_request:
  push:
    branches:
      - main
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
jobs:
  docker:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Get latest Mautic release
        id: mautic_release
        run: |
          VERSION=$(curl -fsSL --max-time 10 https://api.github.com/repos/mautic/mautic/releases/latest \
            | grep '"tag_name"' \
            | head -n 1 \
            | sed -E 's/.*"v?([^"]+)".*/\1/')
          if [ -z "$VERSION" ]; then
            echo "::error::Failed to determine latest Mautic version"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if image already exists (for scheduler)
        run: |
          # Always build on push or PR
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "::notice::Triggered by ${{ github.event_name }} – forcing rebuild."
          else
            IMAGE="ghcr.io/${{ github.repository }}:${{ steps.mautic_release.outputs.version }}"
            if docker manifest inspect "$IMAGE" > /dev/null 2>&1; then
              echo "::notice::Image already exists, skipping scheduled build."
              exit 0
            fi
          fi

      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha
            type=raw,value=latest
            type=raw,value=${{ steps.mautic_release.outputs.version }}

      - name: Announce build
        run: |
          echo "::notice::Building image for Mautic ${{ steps.mautic_release.outputs.version }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.production
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            MAUTIC_VERSION=${{ steps.mautic_release.outputs.version }}
            buildno=${{ github.run_number }}
            gitcommithash=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
